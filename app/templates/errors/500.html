<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | AquaConnect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { background: linear-gradient(135deg, #082f49 0%, #051e30 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-page { text-align: center; color: #fff; padding: 40px 20px; max-width: 520px; }
    .error-code { font-size: 8rem; font-weight: 900; line-height: 1; background: linear-gradient(135deg,#ef4444,#f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .error-icon { font-size: 4rem; margin-bottom: 8px; }
    .error-page h2 { font-size: 1.6rem; font-weight: 800; color: #fff; margin: 12px 0 10px; }
    .error-page p { color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.7; margin-bottom: 32px; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-err-primary { padding: 12px 28px; border-radius: 10px; background: linear-gradient(135deg,#0891b2,#22d3ee); color: #fff; font-weight: 700; font-size: 0.9rem; text-decoration: none; box-shadow: 0 4px 16px rgba(8,145,178,0.4); transition: all 0.2s; }
    .btn-err-primary:hover { transform: translateY(-2px); }
    .btn-err-ghost { padding: 12px 28px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); font-weight: 600; font-size: 0.9rem; text-decoration: none; transition: all 0.2s; }
    .btn-err-ghost:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-icon">⚠️</div>
    <div class="error-code">500</div>
    <h2>Something Went Wrong</h2>
    <p>Our servers hit an unexpected wave. Our team has been notified and is working to fix this. Please try again in a moment.</p>
    <div class="error-actions">
      <a href="{{ url_for('dashboard.index') }}" class="btn-err-primary">🏠 Go to Dashboard</a>
      <a href="javascript:location.reload()" class="btn-err-ghost">↺ Try Again</a>
    </div>
  </div>
</body>
</html>
