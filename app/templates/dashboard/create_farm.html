{% set current_user = user %}
{% extends "base.html" %}
{% block title %}Add Farm{% endblock %}
{% block page_title %}Add New Farm{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Add New Farm 🐠</h1>
  <p>Set up your farm profile to start tracking water quality and finances.</p>
</div>
<div style="max-width:600px;">
  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('dashboard.create_farm') }}">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Farm Name *</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Sunrise Tilapia Farm" required />
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" placeholder="e.g. Laguna, Philippines" />
          </div>
          <div class="form-group">
            <label class="form-label">Area (hectares)</label>
            <input type="number" name="area_hectares" class="form-control" placeholder="e.g. 2.5" step="0.01" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label">Fish Species</label>
            <input type="text" name="fish_species" class="form-control" placeholder="e.g. Tilapia, Bangus, Catfish" />
          </div>
          <div class="form-group">
            <label class="form-label">Water Source</label>
            <select name="water_source" class="form-control form-select">
              <option value="">Select water source</option>
              <option value="Freshwater">Freshwater</option>
              <option value="Saltwater">Saltwater</option>
              <option value="Brackish">Brackish</option>
              <option value="Rain-fed">Rain-fed</option>
              <option value="Groundwater">Groundwater</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-primary">Create Farm</button>
          <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
