{% set current_user = user %}
{% extends "base.html" %}
{% block title %}New Post{% endblock %}
{% block page_title %}Create Forum Post{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Create a New Post ✍️</h1>
  <p>Share your question or knowledge with the aquaculture community.</p>
</div>
<div style="max-width:700px;">
  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('forum.new_post') }}">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-control form-select" required>
            {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" name="title" class="form-control" placeholder="What's your question or topic?" required maxlength="200" />
        </div>
        <div class="form-group">
          <label class="form-label">Content</label>
          <textarea name="content" class="form-control" rows="8"
                    placeholder="Describe your question or knowledge in detail. Include relevant details like fish species, farm setup, or water conditions." required minlength="20"></textarea>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary">Post to Community</button>
          <a href="{{ url_for('forum.index') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
